<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>User Profile</title>
</head>
<body>
  <nav class="navbar">
    <div class="logo"><img src="images/pokeball-pokemon-svgrepo-com.svg" width="40" height="40" alt="PokeStore logo"></div>
    <div class="card-text">
        <img src="images/pokemon-trainer-pokemon-svgrepo-com.svg" width="20" alt="pokemon trainer">
      <p id="user-email">Hello 'user-email'</p>
    </div>
    <div class="login">
      <a href="login.html">
        <img src="images/pokemon-trainer-pokemon-svgrepo-com.svg" width="20" alt="pokemon trainer">
        <span>Password</span>
      </a>
    </div>
  </nav>
  <main>
    <h1>Your cart</h1>
    <div class="product-container">
      <div class="index-card">
        <img src="images/Nidoking.png" alt="nidoking">
      </div>
      <div class="card-text">
        <p>Seems that you don't have products on your cart yet.</p>
      </div>
      <div class="index-card">
        <img src="images/GENGAR.png" alt="gengar">
      </div>
    </div>
    <div class="profile-button-container">
      <a class="action-btn" href="products.html">Back to products</a>
      <button class="action-btn" type="button">Complete Purchase</button>
    </div>
  </main>
</body>
</html>
